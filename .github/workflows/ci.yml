name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Audit (non-blocking)
        run: npm audit --audit-level=moderate || true

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: inyuku
          POSTGRES_PASSWORD: inyuku
          POSTGRES_DB: inyuku_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://inyuku:inyuku@localhost:5432/inyuku_dev
      REDIS_URL: redis://localhost:6379
      # Deterministic CI test values (NOT real secrets) — tests are hermetic via server/test/setup.ts;
      # these cover non-test app steps (e.g. openapi:check building the app).
      ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZmdoaWprbG1ub3BxcnN0dXY=
      BLOB_SIGN_SECRET: test-blob-sign-secret
      R2_ENDPOINT: https://abc123.r2.cloudflarestorage.com
      R2_PUBLIC_BASE_URL: https://cdn.inyuku.co.za
      CORS_ALLOWED_ORIGINS: '*.inyuku.co.za'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Run migrations
        run: npx prisma migrate deploy
      - name: Seed (permissions registry + platform-sentinel business, ADR-INY-013)
        run: npm run db:seed
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: OpenAPI drift check
        run: npm run openapi:check
