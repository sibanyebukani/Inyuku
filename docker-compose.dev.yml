services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: inyuku
      POSTGRES_PASSWORD: inyuku
      POSTGRES_DB: inyuku_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inyuku -d inyuku_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
